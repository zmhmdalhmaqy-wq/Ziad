<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZIAD HOST | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Tajawal', sans-serif;
            background: #0a0c15;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-cyber {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 30%, rgba(45, 122, 255, 0.15), transparent 70%),
                        radial-gradient(ellipse at 85% 70%, rgba(0, 229, 255, 0.1), transparent 60%),
                        radial-gradient(ellipse at 50% 90%, rgba(90, 40, 255, 0.08), transparent 55%);
            z-index: -2;
            animation: auroraPulse 8s ease-in-out infinite alternate;
        }

        @keyframes auroraPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; filter: hue-rotate(10deg); }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(45, 122, 255, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(45, 122, 255, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(45, 122, 255, 0.2), transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            z-index: -1;
            animation: floatGlow 15s ease-in-out infinite;
        }

        .bg-glow-2 {
            left: -200px;
            bottom: -200px;
            top: auto;
            right: auto;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.15), transparent 70%);
            animation: floatGlow 12s ease-in-out infinite reverse;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(60px, 40px); }
        }

        /* جزيئات متحركة */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(45, 122, 255, 0.5);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-10vh) translateX(50px);
                opacity: 0;
            }
        }

        /* حاوية التسجيل */
        .login-wrapper {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            animation: fadeInUp 0.7s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* بطاقة التسجيل */
        .login-card {
            background: rgba(10, 14, 30, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(45, 122, 255, 0.25);
            border-radius: 40px;
            padding: 42px 38px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(45, 122, 255, 0.1) inset;
            transition: all 0.3s;
        }

        .login-card:hover {
            border-color: rgba(45, 122, 255, 0.4);
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.6);
        }

        /* الشعار */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #0f172a, #0d1526);
            border: 2px solid rgba(0, 229, 255, 0.5);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #00e5ff;
            margin: 0 auto 18px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3),
                        0 0 60px rgba(45, 122, 255, 0.15);
            transition: all 0.3s;
        }

        .brand-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(0, 229, 255, 0.5);
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #2d7aff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-sub {
            font-size: 0.8rem;
            color: #6b7aaa;
            margin-top: 8px;
        }

        /* أزرار التبديل */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            padding: 5px;
            border: 1px solid rgba(45, 122, 255, 0.15);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            border: none;
            background: none;
            color: #9ca3cf;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            color: white;
            box-shadow: 0 4px 15px rgba(45, 122, 255, 0.4);
        }

        .tab-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.05);
            color: #eef2ff;
            transform: translateY(-1px);
        }

        /* النماذج */
        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            color: #9ca3cf;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(45, 122, 255, 0.25);
            border-radius: 16px;
            color: #eef2ff;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: #2d7aff;
            background: rgba(45, 122, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.12);
        }

        .form-input::placeholder {
            color: #4b556b;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #4b556b;
            font-size: 0.9rem;
        }

        /* زر التسجيل */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(45, 122, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(45, 122, 255, 0.55);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* التنبيهات */
        .alert {
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .alert.error {
            background: rgba(255, 61, 90, 0.12);
            border: 1px solid rgba(255, 61, 90, 0.3);
            color: #ff7a94;
        }

        .alert.success {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .alert.show {
            display: flex;
            animation: alertSlide 0.3s ease;
        }

        @keyframes alertSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* فواصل */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 24px 0;
            color: #4b556b;
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(45, 122, 255, 0.2);
        }

        /* أزرار التواصل */
        .social-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 136, 204, 0.12);
            border: 1px solid rgba(0, 136, 204, 0.3);
            border-radius: 14px;
            color: #29b5e8;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .social-btn.channel {
            background: rgba(0, 200, 100, 0.1);
            border-color: rgba(0, 200, 100, 0.3);
            color: #00c864;
        }

        .social-btn:hover {
            background: rgba(0, 136, 204, 0.2);
            border-color: rgba(0, 136, 204, 0.5);
            transform: translateY(-2px);
        }

        .social-btn.channel:hover {
            background: rgba(0, 200, 100, 0.2);
            border-color: rgba(0, 200, 100, 0.5);
        }

        /* مميزات الخطة المجانية */
        .features-box {
            background: rgba(45, 122, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .features-box h4 {
            color: #2d7aff;
            margin-bottom: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .features-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .feature-item {
            font-size: 0.7rem;
            color: #9ca3cf;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feature-item i {
            color: #00ff88;
            font-size: 0.65rem;
        }

        /* سبينر */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* تذييل */
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.7rem;
            color: #4b556b;
        }

        .footer a {
            color: #2d7aff;
            text-decoration: none;
            font-weight: 600;
        }

        /* متجاوب */
        @media (max-width: 520px) {
            .login-card {
                padding: 30px 24px;
            }
            .brand-name {
                font-size: 1.4rem;
            }
            .brand-icon {
                width: 65px;
                height: 65px;
                font-size: 1.8rem;
            }
            .tab-btn {
                font-size: 0.8rem;
                padding: 10px;
            }
            .social-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="bg-cyber"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="particles" id="particles"></div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-crown"></i>
            </div>
            <div class="brand-name">ZIAD HOST</div>
            <div class="brand-sub">منصة استضافة متطورة 🚀</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">
                <i class="fas fa-user-plus"></i> حساب جديد
            </button>
        </div>

        <div class="alert" id="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMsg"></span>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <div id="loginForm">
            <div class="form-group">
                <label class="form-label">اسم المستخدم</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="loginUsername" placeholder="أدخل اسم المستخدم" autocomplete="username">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="loginPassword" placeholder="أدخل كلمة المرور" autocomplete="current-password">
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>
            <button class="submit-btn" id="loginBtn" onclick="doLogin()">
                <span id="loginText"><i class="fas fa-sign-in-alt"></i> دخول</span>
                <div class="spinner" id="loginSpinner"></div>
            </button>
        </div>

        <!-- نموذج التسجيل -->
        <div id="registerForm" style="display:none;">
            <div class="features-box">
                <h4><i class="fas fa-gift"></i> مميزات الخطة المجانية</h4>
                <div class="features-grid">
                    <span class="feature-item"><i class="fas fa-check-circle"></i> 500 GB مساحة</span>
                    <span class="feature-item"><i class="fas fa-check-circle"></i> 2 سيرفرات</span>
                    <span class="feature-item"><i class="fas fa-check-circle"></i> 256 MB رام</span>
                    <span class="feature-item"><i class="fas fa-check-circle"></i> دعم Python</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">اسم المستخدم</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="regUsername" placeholder="اختر اسم مستخدم" autocomplete="off">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="regPassword" placeholder="اختر كلمة مرور (4 أحرف+)" autocomplete="new-password">
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>
            <button class="submit-btn" id="registerBtn" onclick="doRegister()">
                <span id="registerText"><i class="fas fa-user-plus"></i> إنشاء حساب</span>
                <div class="spinner" id="registerSpinner"></div>
            </button>
        </div>

        <div class="divider">تواصل معنا</div>

        <div class="social-buttons">
            <a href="https://t.me/U_43_Ziad" target="_blank" class="social-btn">
                <i class="fab fa-telegram-plane"></i>
                المطور @U_43_Ziad
            </a>
            <a href="https://t.me/ZIAD_DARK" target="_blank" class="social-btn channel">
                <i class="fab fa-telegram"></i>
                قناة ZIAD DARK
            </a>
        </div>

        <div class="footer">
            <i class="fas fa-shield-alt"></i> ZIAD HOST © 2026 |
            <a href="https://t.me/U_43_Ziad" target="_blank">@U_43_Ziad</a>
        </div>
    </div>
</div>

<script>
    // إنشاء الجزيئات
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (5 + Math.random() * 15) + 's';
        particle.style.animationDelay = (Math.random() * 10) + 's';
        particle.style.width = particle.style.height = (1 + Math.random() * 3) + 'px';
        particle.style.opacity = 0.2 + Math.random() * 0.6;
        particlesContainer.appendChild(particle);
    }

    function switchTab(tab) {
        clearAlert();
        if (tab === 'login') {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
        } else {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.add('active');
        }
    }

    function showAlert(msg, type = 'error') {
        const alertEl = document.getElementById('alert');
        const icon = alertEl.querySelector('i');
        alertEl.className = `alert ${type} show`;
        icon.className = `fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
        document.getElementById('alertMsg').textContent = msg;
        setTimeout(() => {
            alertEl.classList.remove('show');
        }, 4000);
    }

    function clearAlert() {
        document.getElementById('alert').className = 'alert';
    }

    function setLoading(btnId, spinnerId, textId, isLoading) {
        const btn = document.getElementById(btnId);
        const spinner = document.getElementById(spinnerId);
        const textSpan = document.getElementById(textId);
        if (isLoading) {
            btn.disabled = true;
            spinner.style.display = 'block';
            textSpan.style.display = 'none';
        } else {
            btn.disabled = false;
            spinner.style.display = 'none';
            textSpan.style.display = 'flex';
        }
    }

    async function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!username || !password) {
            showAlert('الرجاء إدخال اسم المستخدم وكلمة المرور');
            return;
        }

        clearAlert();
        setLoading('loginBtn', 'loginSpinner', 'loginText', true);

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showAlert('✅ مرحباً بك! جاري التحويل...', 'success');
                setTimeout(() => {
                    window.location.href = data.redirect || '/';
                }, 800);
            } else {
                showAlert(data.message || 'بيانات الدخول غير صحيحة');
                setLoading('loginBtn', 'loginSpinner', 'loginText', false);
            }
        } catch (e) {
            showAlert('خطأ في الاتصال بالخادم');
            setLoading('loginBtn', 'loginSpinner', 'loginText', false);
        }
    }

    async function doRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();

        if (!username || !password) {
            showAlert('الرجاء إدخال جميع البيانات');
            return;
        }
        if (username.length < 3) {
            showAlert('اسم المستخدم يجب أن يكون 3 أحرف على الأقل');
            return;
        }
        if (password.length < 4) {
            showAlert('كلمة المرور يجب أن تكون 4 أحرف على الأقل');
            return;
        }

        clearAlert();
        setLoading('registerBtn', 'registerSpinner', 'registerText', true);

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showAlert(data.message || '✅ تم إنشاء حسابك بنجاح! يمكنك تسجيل الدخول الآن.', 'success');
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                setTimeout(() => switchTab('login'), 1500);
            } else {
                showAlert(data.message || 'فشل إنشاء الحساب');
            }
        } catch (e) {
            showAlert('خطأ في الاتصال بالخادم');
        }

        setLoading('registerBtn', 'registerSpinner', 'registerText', false);
    }

    // دخول بالضغط على Enter
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const isLoginVisible = document.getElementById('loginForm').style.display !== 'none';
            if (isLoginVisible) {
                doLogin();
            } else {
                doRegister();
            }
        }
    });

    // التحقق من الجلسة الحالية
    fetch('/api/current_user')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                window.location.href = data.is_admin ? '/admin' : '/dashboard';
            }
        })
        .catch(() => {});
</script>
</body>
</html>
